<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Flashstudy</title>

<meta name="theme-color" content="#8b5cf6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Korean Flashstudy">

<link rel="manifest" href="manifest.webmanifest">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>
<body style="background:#0f1020;color:white;font-family:sans-serif">

<h1>Korean Flashstudy</h1>
<button onclick="speak('안녕하세요','ko-KR')">🔊 Probar audio</button>

<script>
let audioRate = 1;

function speak(text, lang, rateOverride = null){
  const clean = String(text || "").trim();
  if(!clean) return;

  const fileName = encodeURIComponent(clean);
  const audioPath = `audio/${fileName}.mp3`;

  const audio = new Audio(audioPath);
  audio.preload = "auto";
  audio.playbackRate = rateOverride ?? audioRate ?? 1;

  audio.onerror = () => fallbackTTS(clean, lang, rateOverride);

  audio.play().catch(() => {
    fallbackTTS(clean, lang, rateOverride);
  });
}

function fallbackTTS(text, lang, rateOverride){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = rateOverride ?? audioRate;
  speechSynthesis.speak(u);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
