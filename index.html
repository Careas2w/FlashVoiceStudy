<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Korean Flashstudy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.webmanifest">
<style>
body{font-family:sans-serif;background:#111;color:#fff;padding:20px}
button{padding:10px 15px;border-radius:8px;border:none;background:#6c5ce7;color:#fff;cursor:pointer}
.voice-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
.voice-overlay.open{display:flex}
.voice-box{background:#222;padding:20px;border-radius:12px;width:300px}
</style>
</head>
<body>

<h1>Korean Flashstudy</h1>
<button id="voiceSettingsBtn">🗣 Voz</button>

<div class="voice-overlay" id="voiceOverlay">
  <div class="voice-box">
    <h3>Configuración de voz</h3>
    <input id="voiceWorkerUrlInput" placeholder="Worker URL" style="width:100%"><br><br>
    <button id="voiceTestBtn">Probar</button>
    <button id="closeVoiceBtn">Cerrar</button>
  </div>
</div>

<script>
const voiceSettingsBtn = document.getElementById("voiceSettingsBtn");
const voiceOverlay = document.getElementById("voiceOverlay");
const closeVoiceBtn = document.getElementById("closeVoiceBtn");
const voiceTestBtn = document.getElementById("voiceTestBtn");
const voiceWorkerUrlInput = document.getElementById("voiceWorkerUrlInput");

voiceSettingsBtn.addEventListener("click", ()=>voiceOverlay.classList.add("open"));
closeVoiceBtn.addEventListener("click", ()=>voiceOverlay.classList.remove("open"));

voiceOverlay.addEventListener("click", e=>{
  if(e.target===voiceOverlay) voiceOverlay.classList.remove("open");
});

voiceTestBtn.addEventListener("click", async ()=>{
  const url = voiceWorkerUrlInput.value.trim();
  if(!url){ alert("Pon la URL del worker"); return; }

  const res = await fetch(url,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({text:"안녕하세요"})
  });

  const blob = await res.blob();
  const audio = new Audio(URL.createObjectURL(blob));
  audio.play();
});
</script>

</body>
</html>
