<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Korean Flashstudy Pro</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    /* RESET Y VARIABLES ORIGINALES */
    :root {
      --bg:#0f1020; --panel:#171a2d; --panel-2:#1d2240; --line:#313a63; --text:#eef1ff;
      --muted:#aeb6db; --primary:#8b5cf6; --primary-2:#a78bfa; --primary-soft:#282251;
      --danger:#ef4444; --notes:#231f3d; --notes-line:#4d4677; --chip:#1f2544;
      --chip-border:#47527f; --chip-active:#7c3aed; --chip-active-text:#ffffff;
      --shadow:0 10px 30px rgba(0,0,0,.35); --overlay:rgba(4,5,16,.84);
      --quiz-bg:#11163a; --quiz-card:#2e3a63; --quiz-line:#5a6893; --quiz-text:#f4f6ff;
      --good:#10b981; --bad:#ef4444;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* NAVEGACIÓN */
    .nav-top {
      height: 60px; background: var(--panel); display: flex; align-items: center;
      padding: 0 20px; border-bottom: 1px solid var(--line); justify-content: space-between;
    }
    .nav-title { font-weight: 700; font-size: 1.2rem; color: var(--primary-2); }

    /* PANTALLAS */
    .screen { display: none; flex: 1; overflow-y: auto; padding: 20px; position: relative; }
    .screen.active { display: flex; flex-direction: column; }

    /* DASHBOARD Y CARGA */
    #drop-zone {
      border: 2px dashed var(--line); border-radius: 15px; padding: 40px 20px;
      text-align: center; background: var(--panel-2); margin-bottom: 20px;
    }
    .btn-main {
      background: var(--primary); color: white; border: none; padding: 12px 24px;
      border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-main:active { transform: scale(0.95); }

    /* FILTROS */
    .filter-section { background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .chip {
      padding: 6px 14px; border-radius: 20px; background: var(--chip);
      border: 1px solid var(--chip-border); font-size: 0.85rem; cursor: pointer;
    }
    .chip.active { background: var(--chip-active); color: var(--chip-active-text); border-color: var(--chip-active); }

    /* MODOS DE ESTUDIO (FLASHCARDS) */
    #flashcard-container {
      perspective: 1000px; width: 100%; max-width: 400px; margin: 20px auto; height: 300px;
    }
    .card-inner {
      position: relative; width: 100%; height: 100%; text-align: center;
      transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer;
    }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 20px; background: var(--panel-2); border: 1px solid var(--line);
      box-shadow: var(--shadow); padding: 20px;
    }
    .card-back { transform: rotateY(180deg); background: var(--primary-soft); }
    .word-ko { font-size: 3rem; font-weight: 700; margin-bottom: 10px; }
    .word-es { font-size: 1.8rem; color: var(--primary-2); }

    /* CANVAS DE ESCRITURA */
    #writing-canvas {
      background: #fff; border-radius: 15px; width: 100%; max-width: 500px;
      height: 250px; margin: 15px auto; touch-action: none; cursor: crosshair;
    }

    /* MODO PAIRS */
    .pairs-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .pair-card {
      background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px;
      padding: 15px 5px; text-align: center; font-size: 0.9rem; min-height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .pair-card.selected { border-color: var(--primary); background: var(--primary-soft); }
    .pair-card.hidden { visibility: hidden; }

    /* DICCIONARIO */
    .dict-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .dict-table th { text-align: left; color: var(--muted); font-size: 0.8rem; padding: 10px; border-bottom: 1px solid var(--line); }
    .dict-table td { padding: 12px 10px; border-bottom: 1px solid var(--line); font-size: 0.95rem; }

    /* CONTROLES */
    .controls-row { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
    .round-btn {
      width: 60px; height: 60px; border-radius: 50%; border: none;
      background: var(--panel-2); color: white; font-size: 1.5rem; display: flex;
      align-items: center; justify-content: center; box-shadow: var(--shadow);
    }
    .btn-success { background: var(--good); }
    .btn-danger { background: var(--bad); }

    /* MENU INFERIOR */
    .nav-bottom {
      height: 70px; background: var(--panel); border-top: 1px solid var(--line);
      display: flex; justify-content: space-around; align-items: center;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--muted); font-size: 0.7rem; gap: 5px; }
    .nav-item.active { color: var(--primary-2); }
    .nav-icon { font-size: 1.4rem; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .word-ko { font-size: 2.2rem; }
      .pairs-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div class="nav-top">
    <div class="nav-title">K-Flashstudy</div>
    <div id="stats" style="font-size: 0.8rem; color: var(--muted);">Carga un Excel para empezar</div>
  </div>

  <!-- PANTALLA: DASHBOARD -->
  <main id="screen-dashboard" class="screen active">
    <div id="drop-zone">
      <p>Arrastra tu Excel aquí o</p>
      <input type="file" id="fileInput" accept=".xlsx, .xls" hidden />
      <button class="btn-main" onclick="document.getElementById('fileInput').click()">Seleccionar Archivo</button>
    </div>

    <div id="filters-area" style="display:none;">
      <div class="filter-section">
        <strong>Temas (Topics)</strong>
        <div id="topic-chips" class="chip-container"></div>
      </div>
      <div class="filter-section">
        <strong>Unidades (Units)</strong>
        <div id="unit-chips" class="chip-container"></div>
      </div>
      <button class="btn-main" style="width:100%" onclick="applyFilters()">Empezar con <span id="filtered-count">0</span> palabras</button>
    </div>
  </main>

  <!-- PANTALLA: ESTUDIO (FLASHCARDS) -->
  <main id="screen-study" class="screen">
    <div id="flashcard-container" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-front">
          <div class="word-ko" id="study-ko">-</div>
          <div style="display:flex; gap:15px; margin-top:20px;">
            <button class="btn-main" style="background:#444" onclick="event.stopPropagation(); speakCurrent()">🔊</button>
            <button class="btn-main" style="background:#444" onclick="event.stopPropagation(); speakCurrent(0.6)">🐢</button>
          </div>
        </div>
        <div class="card-back">
          <div class="word-es" id="study-es">-</div>
          <div style="font-size:0.9rem; margin-top:15px; opacity:0.8" id="study-note"></div>
        </div>
      </div>
    </div>
    
    <canvas id="writing-canvas"></canvas>
    <div style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
      <button onclick="clearCanvas()" style="background:#444; color:white; border:none; padding:5px 15px; border-radius:5px;">Borrar Lienzo</button>
    </div>

    <div class="controls-row">
      <button class="round-btn btn-danger" onclick="nextCard(false)">✕</button>
      <button class="round-btn btn-success" onclick="nextCard(true)">✓</button>
    </div>
  </main>

  <!-- PANTALLA: DICCIONARIO -->
  <main id="screen-dict" class="screen">
    <input type="text" id="dict-search" placeholder="Buscar palabra..." oninput="renderDict()" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel-2); color:white; margin-bottom:15px;">
    <table class="dict-table">
      <thead><tr><th>COREANO</th><th>ESPAÑOL</th><th>AUDIO</th></tr></thead>
      <tbody id="dict-body"></tbody>
    </table>
  </main>

  <!-- PANTALLA: PAIRS (JUEGO) -->
  <main id="screen-pairs" class="screen">
    <div class="pairs-grid" id="pairs-grid"></div>
    <button class="btn-main" style="margin-top:20px" onclick="initPairs()">Reiniciar Juego</button>
  </main>

  <!-- NAVEGACIÓN INFERIOR -->
  <nav class="nav-bottom">
    <div class="nav-item active" onclick="switchScreen('dashboard', this)">
      <span class="nav-icon">🏠</span><span>Inicio</span>
    </div>
    <div class="nav-item" onclick="switchScreen('study', this)">
      <span class="nav-icon">🎴</span><span>Estudio</span>
    </div>
    <div class="nav-item" onclick="switchScreen('pairs', this)">
      <span class="nav-icon">🧩</span><span>Pairs</span>
    </div>
    <div class="nav-item" onclick="switchScreen('dict', this)">
      <span class="nav-icon">📖</span><span>Dict</span>
    </div>
    <div class="nav-item" onclick="window.location.reload()">
      <span class="nav-icon">🔄</span><span>Update</span>
    </div>
  </nav>

  <script>
    // --- VARIABLES DE ESTADO ---
    let rawData = [];
    let filteredData = [];
    let currentIndex = 0;
    let selectedTopics = new Set();
    let selectedUnits = new Set();
    let isFlipped = false;

    // --- CARGA DE EXCEL ---
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);
        
        rawData = json.map(item => ({
          coreano: String(item.Coreano || '').trim(),
          espanol: String(item.Español || '').trim(),
          topic: String(item.Topic || 'Otros').trim(),
          unit: String(item.Unit || '1').trim(),
          nota: String(item.Nota || '').trim()
        })).filter(item => item.coreano !== '');

        processFilters();
      };
      reader.readAsArrayBuffer(file);
    });

    function processFilters() {
      const topics = [...new Set(rawData.map(i => i.topic))];
      const units = [...new Set(rawData.map(i => i.unit))];

      const tContainer = document.getElementById('topic-chips');
      tContainer.innerHTML = topics.map(t => `<div class="chip" onclick="toggleFilter(this, 'topic', '${t}')">${t}</div>`).join('');
      
      const uContainer = document.getElementById('unit-chips');
      uContainer.innerHTML = units.map(u => `<div class="chip" onclick="toggleFilter(this, 'unit', '${u}')">${u}</div>`).join('');

      document.getElementById('filters-area').style.display = 'block';
      applyFilters();
    }

    function toggleFilter(el, type, value) {
      el.classList.toggle('active');
      const set = (type === 'topic') ? selectedTopics : selectedUnits;
      if (set.has(value)) set.delete(value); else set.add(value);
      applyFilters();
    }

    function applyFilters() {
      filteredData = rawData.filter(item => {
        const tOk = selectedTopics.size === 0 || selectedTopics.has(item.topic);
        const uOk = selectedUnits.size === 0 || selectedUnits.has(item.unit);
        return tOk && uOk;
      });
      document.getElementById('filtered-count').innerText = filteredData.length;
    }

    // --- NAVEGACIÓN ---
    function switchScreen(id, el) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');

      if(id === 'study' && filteredData.length > 0) showCard();
      if(id === 'dict') renderDict();
      if(id === 'pairs') initPairs();
    }

    // --- LÓGICA DE AUDIO (SISTEMA MP3 PROFESIONAL) ---
    function speak(text, rate = 1) {
      if (!text) return;
      
      // Limpiamos el texto para evitar errores de URL
      const cleanText = text.trim();
      const audioPath = `audio/${cleanText}.mp3`;
      
      const audio = new Audio(audioPath);
      audio.playbackRate = rate;
      
      audio.play().catch(err => {
        console.warn("No se encontró el archivo MP3, intentando voz del sistema...", err);
        // Fallback: Si no hay MP3, intentamos usar la voz del navegador
        const msg = new SpeechSynthesisUtterance(cleanText);
        msg.lang = 'ko-KR';
        msg.rate = rate;
        window.speechSynthesis.speak(msg);
      });
    }

    function speakCurrent(rate = 1) {
      if (filteredData[currentIndex]) {
        speak(filteredData[currentIndex].coreano, rate);
      }
    }

    // --- FLASHCARDS ---
    function showCard() {
      if (filteredData.length === 0) return;
      const word = filteredData[currentIndex];
      document.getElementById('study-ko').innerText = word.coreano;
      document.getElementById('study-es').innerText = word.espanol;
      document.getElementById('study-note').innerText = word.nota;
      document.getElementById('card-inner').classList.remove('flipped');
      isFlipped = false;
      clearCanvas();
      
      document.getElementById('stats').innerText = `${currentIndex + 1} / ${filteredData.length}`;
      speakCurrent();
    }

    function flipCard() {
      isFlipped = !isFlipped;
      document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
    }

    function nextCard(success) {
      currentIndex = (currentIndex + 1) % filteredData.length;
      showCard();
    }

    // --- DICCIONARIO ---
    function renderDict() {
      const search = document.getElementById('dict-search').value.toLowerCase();
      const body = document.getElementById('dict-body');
      const list = filteredData.filter(i => i.coreano.toLowerCase().includes(search) || i.espanol.toLowerCase().includes(search));
      
      body.innerHTML = list.map(i => `
        <tr>
          <td><strong>${i.coreano}</strong></td>
          <td>${i.espanol}</td>
          <td><button onclick="speak('${i.coreano}')">🔊</button></td>
        </tr>
      `).join('');
    }

    // --- JUEGO PAIRS ---
    let firstPairCard = null;
    function initPairs() {
      const container = document.getElementById('pairs-grid');
      container.innerHTML = '';
      let subset = [...filteredData].sort(() => 0.5 - Math.random()).slice(0, 6);
      let items = [];
      subset.forEach(w => {
        items.push({ text: w.coreano, match: w.coreano, type: 'ko' });
        items.push({ text: w.espanol, match: w.coreano, type: 'es' });
      });
      items.sort(() => 0.5 - Math.random());

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'pair-card';
        div.innerText = item.text;
        div.onclick = () => checkPair(div, item);
        container.appendChild(div);
      });
    }

    function checkPair(div, item) {
      if (div.classList.contains('hidden')) return;
      div.classList.add('selected');
      if (item.type === 'ko') speak(item.text);

      if (!firstPairCard) {
        firstPairCard = { div, item };
      } else {
        if (firstPairCard.div === div) return;
        if (firstPairCard.item.match === item.match && firstPairCard.item.type !== item.type) {
          setTimeout(() => {
            div.classList.add('hidden');
            firstPairCard.div.classList.add('hidden');
            firstPairCard = null;
          }, 300);
        } else {
          setTimeout(() => {
            div.classList.remove('selected');
            firstPairCard.div.classList.remove('selected');
            firstPairCard = null;
          }, 500);
        }
      }
    }

    // --- CANVAS DE ESCRITURA ---
    const canvas = document.getElementById('writing-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function initCanvas() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
    }

    canvas.addEventListener('touchstart', (e) => { drawing = true; paint(e); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { paint(e); e.preventDefault(); });
    canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });

    function paint(e) {
      if (!drawing) return;
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    // SERVICE WORKER
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
