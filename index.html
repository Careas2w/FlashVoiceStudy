<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Korean Flashstudy</title>
  <meta name="theme-color" content="#8b5cf6" />
  <link rel="manifest" href="manifest.webmanifest" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg:#0f1020; --panel:#171a2d; --panel-2:#1d2240; --line:#313a63; --text:#eef1ff;
      --muted:#aeb6db; --primary:#8b5cf6; --primary-2:#a78bfa; --primary-soft:#282251;
      --danger:#ef4444; --notes:#231f3d; --notes-line:#4d4677; --chip:#1f2544;
      --shadow:0 10px 30px rgba(0,0,0,.35); --overlay:rgba(4,5,16,.84);
      --quiz-bg:#11163a; --good:#10b981; --warn:#f59e0b; --bad:#ef4444;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; }
    .layout { display: grid; grid-template-columns: 340px 1fr; padding: 18px; gap: 18px; }
    .sidebar { background: var(--panel-2); border-radius: 28px; padding: 16px; position: sticky; top: 18px; height: calc(100vh - 36px); overflow-y: auto; }
    .main { background: var(--panel); border-radius: 32px; padding: 18px; min-height: 80vh; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
    .card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 20px; padding: 20px; transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); }
    .icon-btn { cursor: pointer; border: none; border-radius: 12px; background: var(--panel); color: var(--text); padding: 8px 12px; margin-top: 10px; }
    .overlay { position: fixed; inset: 0; background: var(--overlay); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
    .overlay.open { display: flex; }
    .hangul-table { width: 100%; border-collapse: collapse; margin-top: 20px; color: var(--text); }
    .hangul-cell { border: 1px solid var(--line); padding: 10px; text-align: center; }
    .table-icon-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; }
  </style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <h2 style="color: var(--primary-2)">Korean Study</h2>
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
    <div id="navContent" style="margin-top:20px"></div>
  </aside>

  <main class="main">
    <h1 id="welcomeTitle">Carga tu Excel para empezar</h1>
    <div id="cardsContainer" class="cards-grid"></div>
  </main>
</div>

<script>
  // VARIABLES DE ESTADO Y DATOS
  let allData = [];
  let audioRate = 1.0;
  const NORMAL_AUDIO_RATE = 1.0;
  const SLOW_AUDIO_RATE = 0.6;

  // --- FUNCIÓN DE VOZ (CORREGIDA PARA MP3 LOCALES) ---
  function speak(text, lang, rateOverride = null) {
    const clean = String(text || "").trim();
    if (!clean) return;

    // Busca el archivo en la carpeta audio/ con el nombre exacto de la palabra
    const audioPath = `./audio/${encodeURIComponent(clean)}.mp3`;
    const audio = new Audio(audioPath);
    
    // Aplicar velocidad
    audio.playbackRate = rateOverride ?? audioRate;
    
    audio.play().catch(err => {
      console.warn("No se encontró el audio para:", clean, "en la ruta:", audioPath);
    });
  }

  // --- LOGICA DE EXCEL ---
  const fileInput = document.getElementById('fileInput');
  fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
      const data = new Uint8Array(evt.target.result);
      const workbook = XLSX.read(data, {type: 'array'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);
      
      allData = json.map((row, index) => ({
        id: index,
        coreano: row.Coreano || row.coreano || "",
        español: row.Español || row.español || "",
        topic: row.Topic || row.topic || "General"
      }));
      
      document.getElementById('welcomeTitle').textContent = "Vocabulario Cargado";
      renderCards(allData);
    };
    reader.readAsArrayBuffer(file);
  });

  function renderCards(data) {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = data.map(row => `
      <div class="card">
        <div style="font-size:24px; font-weight:800;">${row.coreano}</div>
        <div style="color:var(--muted)">${row.español}</div>
        <div style="display:flex; gap:10px;">
          <button class="icon-btn" onclick="speak('${row.coreano}', 'ko-KR')">🔊 Normal</button>
          <button class="icon-btn" onclick="speak('${row.coreano}', 'ko-KR', 0.6)">🐢 Lento</button>
        </div>
      </div>
    `).join('');
  }

  // EVENTO PARA TABLAS HANGUL
  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-hangul-audio]');
    if (btn) {
      speak(btn.dataset.hangulAudio, 'ko-KR');
    }
  });

  // SERVICE WORKER REGISTRATION
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
