<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Korean Flashstudy</title>
</head>
<body>

<script>
/* =========================
   FUNCIÓN ORIGINAL MODIFICADA
   ========================= */

function speak(text, lang, rateOverride = null){
  const clean = String(text || "").trim();
  if(!clean) return;

  const rate = rateOverride ?? 1;

  // ✅ NUEVO: intenta reproducir MP3
  const audio = new Audio(`audio/${encodeURIComponent(clean)}.mp3`);
  audio.playbackRate = rate;

  audio.play().catch(() => {
    // 🔁 fallback EXACTO a tu sistema original
    if(!("speechSynthesis" in window)){
      alert("Tu navegador no soporta síntesis de voz.");
      return;
    }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = lang;
    u.rate = rate;
    u.pitch = lang === "ko-KR" ? 1.02 : 1;
    u.volume = 1;
    speechSynthesis.speak(u);
  });
}

</script>

</body>
</html>
